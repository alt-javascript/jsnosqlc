name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # CI-safe: core + memory, no external services
  test:
    name: Unit tests (core + memory)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # Integration: MongoDB + DynamoDB — requires service containers
  test-integration:
    name: Integration tests (MongoDB + DynamoDB)
    runs-on: ubuntu-latest
    needs: test

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/shell/ || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests (MongoDB)
        env:
          MONGODB_URL: jsnoslqc:mongodb://localhost:27017/jsnoslqc_ci
        run: npm test --workspace=packages/mongodb

      - name: Run integration tests (DynamoDB)
        env:
          DYNAMODB_ENDPOINT: http://localhost:8000
          DYNAMODB_REGION: us-east-1
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
        run: npm test --workspace=packages/dynamodb
